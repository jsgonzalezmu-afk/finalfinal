<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monitoreo Jurídico — Minutas Legales Colombia</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ═══════════════════════════════════════════════════════
       BASE — variables y estilos fundamentales
    ═══════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a3a5c;
      --primary-light: #2563a8;
      --primary-dark: #0d2540;
      --accent: #c9a84c;
      --accent-light: #e6c97a;
      --accent-dark: #a8893a;
      --bg: #faf8f3;
      --bg-soft: #f3efe5;
      --bg-card: #ffffff;
      --text: #1c1c1e;
      --text-muted: #6b6b75;
      --text-soft: #8a8a93;
      --border: #e8e2d3;
      --border-strong: #d4cab0;
      --gold-line: #c9a84c;
      --danger: #b03a2e;
      --success: #1e7e34;
      --shadow-xs: 0 1px 2px rgba(26,58,92,0.05);
      --shadow-sm: 0 2px 8px rgba(26,58,92,0.06);
      --shadow: 0 4px 18px rgba(26,58,92,0.08);
      --shadow-md: 0 10px 30px rgba(26,58,92,0.10);
      --shadow-lg: 0 24px 60px rgba(13,37,64,0.18);
      --radius-sm: 4px;
      --radius: 6px;
      --radius-lg: 10px;
      --radius-xl: 14px;
      --font-display: "Cormorant Garamond", "Garamond", "Georgia", serif;
      --font-body: "Lora", "Georgia", serif;
      --font-ui: "Inter", -apple-system, "Segoe UI", sans-serif;
      --ease: cubic-bezier(.4,.0,.2,1);
      --ease-out: cubic-bezier(.16,1,.3,1);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 16px;
      line-height: 1.6;
    }
    ::selection { background: var(--accent); color: var(--primary); }

    /* ═══════════════════════════════════════════════════════
       BOTONES
    ═══════════════════════════════════════════════════════ */
    .btn {
      font-family: var(--font-ui);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 26px; border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      text-decoration: none; position: relative;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary   { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 14px rgba(26,58,92,0.22); }
    .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); box-shadow: 0 8px 22px rgba(26,58,92,0.35); }
    .btn-accent    { background: var(--accent); color: var(--primary); border-color: var(--accent); box-shadow: 0 4px 14px rgba(201,168,76,0.3); font-weight: 700; }
    .btn-accent:hover { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); box-shadow: 0 8px 22px rgba(201,168,76,0.4); }
    .btn-outline   { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-outline:hover { background: var(--primary); color: #fff; }
    .btn-danger    { background: var(--danger); color: #fff; border-color: var(--danger); box-shadow: 0 4px 14px rgba(176,58,46,0.25); }
    .btn-sm { padding: 8px 16px; font-size: 0.72rem; }

    /* ═══════════════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════════════ */
    .toast {
      font-family: var(--font-ui);
      position: fixed; bottom: 28px; right: 28px;
      background: var(--primary); color: #fff;
      padding: 16px 24px; border-radius: var(--radius);
      font-size: 0.88rem; font-weight: 500;
      box-shadow: var(--shadow-lg);
      transform: translateY(20px); opacity: 0;
      transition: all 0.32s var(--ease-out);
      z-index: 9999; max-width: 360px;
      border-left: 3px solid var(--gold-line);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); border-left-color: #6b1a14; }
    .toast.ok    { background: var(--success); border-left-color: #0d4a1f; }
    @media (max-width: 560px) {
      .toast { bottom: 16px; right: 12px; left: 12px; max-width: none; font-size: 0.85rem; padding: 14px 18px; }
    }

    /* ═══════════════════════════════════════════════════════
       SPINNER
    ═══════════════════════════════════════════════════════ */
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 2px solid var(--border);
      border-top-color: var(--gold-line);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 70px auto;
    }

    /* ═══════════════════════════════════════════════════════
       PANTALLA DE CARGA INICIAL
    ═══════════════════════════════════════════════════════ */
    #page-loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 500;
      transition: opacity 0.3s var(--ease-out);
    }
    #page-loading.hidden { opacity: 0; pointer-events: none; }
    .page-loading-logo {
      font-family: var(--font-display);
      font-size: 1.5rem; font-weight: 600; color: var(--primary);
      letter-spacing: 0.01em;
    }
    .page-loading-sub {
      font-family: var(--font-ui); font-size: 0.8rem;
      color: var(--text-soft); letter-spacing: 0.12em; text-transform: uppercase;
    }
    .page-loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold-line);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* ═══════════════════════════════════════════════════════
       HEADER DE LA PÁGINA
    ═══════════════════════════════════════════════════════ */
    .mon-page-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .mon-page-header::after {
      content: ""; display: block; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-line) 20%, var(--gold-line) 80%, transparent 100%);
      opacity: 0.55;
    }
    .mon-page-header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 72px; gap: 16px;
    }

    /* Logo + título */
    .mon-header-logo {
      display: flex; align-items: center; gap: 13px;
      font-family: var(--font-display);
      font-size: 1.35rem; font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: opacity 0.2s var(--ease);
      flex-shrink: 0;
    }
    .mon-header-logo:hover { opacity: 0.75; }
    .mon-header-logo-icon {
      width: 40px; height: 40px;
      border: 1.5px solid var(--gold-line);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mon-header-logo-text { line-height: 1.1; }
    .mon-header-logo-name { display: block; }
    .mon-header-logo-sub {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent-dark); margin-top: 1px;
    }

    /* Zona central: título sección */
    .mon-header-title {
      flex: 1; text-align: center;
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 600; color: var(--primary);
      letter-spacing: 0.01em;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .mon-header-title-divider {
      width: 1px; height: 18px;
      background: var(--border-strong); opacity: 0.6;
    }
    .mon-header-plan {
      font-family: var(--font-ui);
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px;
    }
    .mon-header-plan-basico   { background: rgba(26,58,92,0.08);   color: var(--primary); }
    .mon-header-plan-premium  { background: rgba(201,168,76,0.15); color: var(--accent-dark); border: 1px solid rgba(201,168,76,0.35); }

    /* Botón volver */
    .mon-header-back {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
      color: var(--primary-light); text-decoration: none;
      padding: 8px 14px; border-radius: var(--radius);
      border: 1px solid var(--border);
      transition: border-color 0.18s, color 0.18s, background 0.18s;
      flex-shrink: 0;
      background: none; cursor: pointer;
    }
    .mon-header-back:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--bg-soft);
    }

    /* ═══════════════════════════════════════════════════════
       BREADCRUMB / EYEBROW
    ═══════════════════════════════════════════════════════ */
    .mon-eyebrow {
      max-width: 1148px; margin: 28px auto 0; padding: 0 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .mon-eyebrow-rule {
      width: 28px; height: 1px; background: var(--gold-line); opacity: 0.7;
    }
    .mon-eyebrow-text {
      font-family: var(--font-ui); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent-dark);
    }

    /* ═══════════════════════════════════════════════════════
       CONTENEDOR PRINCIPAL
    ═══════════════════════════════════════════════════════ */
    #page-body {
      display: none;
    }
    #page-body.visible {
      display: block;
    }
    #monitoreo-content {
      max-width: 1148px; margin: 0 auto; padding: 0 0 60px;
    }

    /* ═══════════════════════════════════════════════════════
       PANTALLA DE ERROR / ACCESO DENEGADO
    ═══════════════════════════════════════════════════════ */
    .mon-access-denied {
      max-width: 520px; margin: 80px auto; padding: 0 24px;
      text-align: center; font-family: var(--font-ui);
    }
    .mon-access-denied-icon {
      width: 72px; height: 72px; margin: 0 auto 24px;
      border: 1.5px solid var(--gold-line); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); opacity: 0.45;
    }
    .mon-access-denied h2 {
      font-family: var(--font-display); font-size: 1.8rem; font-weight: 600;
      color: var(--primary); margin-bottom: 12px;
    }
    .mon-access-denied p {
      font-family: var(--font-ui); font-size: 0.9rem; color: var(--text-muted);
      line-height: 1.65; margin-bottom: 28px;
    }
    .mon-access-denied-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }

    /* ═══════════════════════════════════════════════════════
       MONITOREO JURÍDICO — Dashboard (copiado de styles.css)
    ═══════════════════════════════════════════════════════ */
    @keyframes mon-spin { to { transform: rotate(360deg); } }
    @keyframes mon-shimmer { to { background-position: -200% 0; } }
    @keyframes mon-slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes mon-pub-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); }
      70%  { box-shadow: 0 0 0 5px rgba(245,158,11,0); }
      100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
    }

    /* Layout general */
    .mon-dashboard { display: flex; flex-direction: column; gap: 20px; padding: 0 0 48px; }

    /* KPI Row */
    .mon-kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 14px; padding: 0 24px; max-width: 1100px; margin: 0 auto; width: 100%;
    }
    .mon-kpi {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: var(--shadow-xs); cursor: pointer;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.15s;
      user-select: none;
    }
    .mon-kpi:hover { box-shadow: var(--shadow-sm); border-color: var(--primary); transform: translateY(-1px); }
    .mon-kpi-icon {
      width: 40px; height: 40px; border-radius: var(--radius);
      background: var(--bg-soft); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; color: var(--primary);
    }
    .mon-kpi.kpi-accent .mon-kpi-icon { background: rgba(201,168,76,0.12); color: var(--accent-dark); }
    .mon-kpi.kpi-ok    .mon-kpi-icon { background: rgba(39,174,96,0.1);   color: #27ae60; }
    .mon-kpi.kpi-warn  .mon-kpi-icon { background: rgba(230,126,34,0.1);  color: #e67e22; }
    .mon-kpi-body { min-width: 0; }
    .mon-kpi-value {
      font-family: var(--font-display); font-size: 2rem; font-weight: 700;
      color: var(--primary); line-height: 1;
    }
    .mon-kpi.kpi-accent .mon-kpi-value { color: var(--accent-dark); }
    .mon-kpi.kpi-ok    .mon-kpi-value  { color: #27ae60; }
    .mon-kpi.kpi-warn  .mon-kpi-value  { color: #e67e22; }
    .mon-kpi-label {
      font-family: var(--font-ui); font-size: 0.72rem; font-weight: 600;
      color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em;
      margin-top: 3px;
    }

    /* Skeleton KPI */
    .mon-skel {
      background: linear-gradient(90deg, var(--bg-soft) 25%, var(--border) 50%, var(--bg-soft) 75%);
      background-size: 200% 100%; animation: mon-shimmer 1.4s infinite;
      border-radius: var(--radius); border: none !important; cursor: default;
      pointer-events: none;
    }
    .mon-skel.mon-kpi { min-height: 80px; }
    .mon-skel-line { height: 14px; margin: 6px 0; }
    .mon-skel-line.w60 { width: 60%; }
    .mon-skel-line.w40 { width: 40%; }
    .mon-skel-line.w80 { width: 80%; }
    .mon-skel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
    .mon-skeletons { display: flex; flex-direction: column; gap: 12px; }

    /* Panel sidebar + main */
    .mon-panel {
      display: flex; align-items: flex-start; gap: 20px;
      padding: 0 24px; max-width: 1100px; margin: 0 auto; width: 100%;
    }

    /* Sidebar */
    .mon-sidebar {
      width: 200px; flex-shrink: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 10px 0;
      box-shadow: var(--shadow-xs); position: sticky; top: 82px;
    }
    .mon-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
    .mon-nav-item {
      display: flex; align-items: center; gap: 10px;
      background: none; border: none; border-radius: var(--radius);
      padding: 9px 10px; cursor: pointer; width: 100%; text-align: left;
      font-family: var(--font-ui); font-size: 0.85rem; color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
    }
    .mon-nav-item:hover { background: var(--bg-soft); color: var(--text); }
    .mon-nav-item.active { background: rgba(26,58,92,0.07); color: var(--primary); font-weight: 600; }
    .mon-nav-icon { flex-shrink: 0; opacity: 0.7; }
    .mon-nav-item.active .mon-nav-icon { opacity: 1; }
    .mon-nav-label { flex: 1; }
    .mon-nav-count {
      font-size: 0.72rem; font-weight: 700; color: var(--text-soft);
      background: var(--bg-soft); padding: 1px 7px; border-radius: 99px;
      min-width: 22px; text-align: center;
    }
    .mon-nav-item.active .mon-nav-count { background: rgba(26,58,92,0.1); color: var(--primary); }
    .mon-nav-count-error { background: #fef2f2 !important; color: #dc2626 !important; }
    /* ── Logs de consulta ─────────────────────────────────────── */
    .mon-logs-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px 10px; font-size: 0.85rem; font-weight: 600;
      color: var(--text-soft); border-bottom: 1px solid var(--border);
    }
    .mon-logs-header svg { flex-shrink: 0; }
    .mon-logs-header span { flex: 1; }
    .mon-logs-clear {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 10px; font-size: 0.75rem; font-weight: 500;
      color: var(--text-soft); cursor: pointer; transition: all .15s;
      font-family: var(--font-ui);
    }
    .mon-logs-clear:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .mon-logs-list { padding: 6px 0; }
    .mon-log-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 18px; border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .mon-log-row:last-child { border-bottom: none; }
    .mon-log-row:hover { background: var(--bg-soft); }
    .mon-log-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .mon-log-dot-ok    { background: #22c55e; }
    .mon-log-dot-error { background: #ef4444; }
    .mon-log-body { flex: 1; min-width: 0; }
    .mon-log-fecha  { font-size: 0.75rem; color: var(--text-soft); margin-bottom: 2px; }
    .mon-log-titulo { font-size: 0.84rem; font-weight: 500; color: var(--text); line-height: 1.4; }
    .mon-log-estados { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
    .mon-log-estado { font-size: 0.78rem; font-weight: 500; }
    .mon-log-estado-ok  { color: #15803d; }
    .mon-log-estado-err { color: #dc2626; }
    .mon-log-detalle{
      font-size: 0.75rem; color: #b91c1c; margin-top: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mon-log-badge {
      flex-shrink: 0; font-size: 0.68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 99px; letter-spacing: .03em;
    }
    .mon-log-badge-ok    { background: #dcfce7; color: #15803d; }
    .mon-log-badge-error { background: #fef2f2; color: #dc2626; }
    .mon-sidebar-divider { height: 1px; background: var(--border); margin: 10px 8px; }
    .mon-sidebar-add {
      display: flex; align-items: center; gap: 8px;
      width: calc(100% - 16px); margin: 0 8px;
      background: none; border: 1px dashed var(--border);
      border-radius: var(--radius); padding: 9px 10px;
      font-family: var(--font-ui); font-size: 0.82rem; font-weight: 600;
      color: var(--primary-light); cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .mon-sidebar-add:hover,
    .mon-sidebar-add.active { border-color: var(--primary); background: rgba(26,58,92,0.05); color: var(--primary); border-style: solid; }
    .mon-sidebar-logout {
      display: none; align-items: center; gap: 8px;
      width: calc(100% - 16px); margin: 6px 8px 4px;
      background: none; border: 1px solid transparent;
      border-radius: var(--radius); padding: 9px 10px;
      font-family: var(--font-ui); font-size: 0.82rem; font-weight: 600;
      color: var(--danger); cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .mon-sidebar-logout:hover { border-color: var(--danger); background: rgba(176,58,46,0.06); }

    /* Main */
    .mon-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }

    /* Formulario agregar */
    .mon-form-collapse {
      background: var(--bg-card); border: 1px solid var(--primary);
      border-radius: var(--radius-lg); padding: 20px 22px;
      box-shadow: 0 0 0 3px rgba(26,58,92,0.06);
    }
    .mon-form-fields {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px;
    }
    .mon-add-field { display: flex; flex-direction: column; gap: 5px; }
    .mon-add-field label {
      font-family: var(--font-ui); font-size: 0.73rem; font-weight: 700;
      color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;
    }
    .mon-req { color: var(--accent-dark); }
    .mon-opt { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-soft); font-size: 0.7rem; }
    .mon-add-field input {
      padding: 9px 13px; border: 1px solid var(--border);
      border-radius: var(--radius); font-family: var(--font-ui);
      font-size: 0.92rem; color: var(--text); background: var(--bg);
      transition: border-color 0.18s;
    }

    /* Botones acción */

    /* Pie tarjeta */
    .mon-card-foot {

      min-width: 34px; height: 34px; display: inline-flex; align-items: center; justify-content: center;

    /* Empty states */

    .mon-empty-icon { display: flex; justify-content: center; margin-bottom: 20px; color: var(--primary); opacity: 0.3; }
    .mon-empty h3 { color: var(--primary); margin-bottom: 10px; font-family: var(--font-display); font-size: 1.4rem; }
    .mon-empty p { max-width: 380px; margin: 0 auto; font-size: 0.88rem; line-height: 1.65; }
    .mon-empty-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }

    .mon-badge-pub {
      display: inline-flex; align-items: center; gap: 4px;

      border: 1px solid #fde68a;

    .mon-action-pp:hover { background: #fef3c7 !important; border-color: #fbbf24 !important; }
    .mon-foot-toggles { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

      font-family: var(--font-ui); font-size: 0.75rem; font-weight: 500;

      transition: background 0.15s, color 0.15s; white-space: nowrap;

    .mon-toggle-pubs:hover { background: #fef3c7; }

    .mon-toggle-pubs.mon-toggle-open svg:last-child { transform: rotate(180deg); }
    .mon-toggle-pubs-new { position: relative; }

      content: ""; position: absolute; top: 3px; right: 2px;
      width: 6px; height: 6px; border-radius: 50%;

    .mon-pub-list { padding: 8px 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .mon-pub-item-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }

    /* ═══════════════════════════════════════════════════════
       FRANJA DE ERROR EN TARJETA
    ═══════════════════════════════════════════════════════ */
    .mon-err-strip {

       RESPONSIVE
    ═══════════════════════════════════════════════════════ */
    @media (max-width: 900px) {

    }
    @media (max-width: 480px) {
      .mon-header-back span { display: none; }
      .mon-eyebrow { padding: 0 12px; }
    }

  <script>
    /* ═══════════════════════════════════════════════════════════════
       MONITOREO.HTML — Inicialización y verificación de acceso
    ═══════════════════════════════════════════════════════════════ */

    /* ── Credenciales Supabase ── */
    const SUPABASE_URL      = "https://fcvtjzkhwjqkygghttmg.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Bzez62wgnyfb_HuFfln1Gw_BZBAPq1a";

    /* ── Globales que monitoreo.js necesita ── */
    var supabaseClient      = null;
    var currentUser         = null;
    var suscripcionMonitoreo = null;

    /* ── Toast ── */
    var _toastTimer = null;
    function toast(msg, type) {
      const el = document.getElementById("toast");
      if (!el) return;
      el.textContent = msg;
      el.className = "toast show" + (type === "error" ? " error" : type === "ok" ? " ok" : "");
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.classList.remove("show"); }, 4000);
    }

    /* ── Redirect a inicio ── */
    function irAInicio() {
      window.location.href = "index.html";
    }

    /* ── Ocultar pantalla de carga ── */
    function ocultarCarga() {
      const loading = document.getElementById("page-loading");
      const body    = document.getElementById("page-body");
      if (loading) loading.classList.add("hidden");
      setTimeout(() => {
        if (loading) loading.style.display = "none";
        if (body)    body.classList.add("visible");
      }, 320);
    }

    /* ── Mostrar pantalla de acceso denegado ── */
    function mostrarAccesoDenegado(motivo) {
      const content = document.getElementById("monitoreo-content");
      if (content) {
        content.innerHTML = `
          <div class="mon-access-denied">
            <div class="mon-access-denied-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="21"/><path d="M3 9h18"/><path d="M3 9l4.5 9S3 18 3 9z"/><path d="M21 9l-4.5 9S21 18 21 9z"/><path d="M9 21h6"/></svg>
            </div>
            <h2>Acceso restringido</h2>
            <p>${motivo}</p>
            <div class="mon-access-denied-actions">
              <a href="index.html" class="btn btn-accent">Ir al inicio</a>
            </div>
          </div>`;
      }
      ocultarCarga();
    }

    /* ── Badge de plan en el header ── */
    function mostrarBadgePlan(plan) {
      const badge = document.getElementById("header-plan-badge");
      if (!badge) return;
      if (plan === "premium") {
        badge.textContent = "✦ Premium";
        badge.className = "mon-header-plan mon-header-plan-premium";
      } else {
        badge.textContent = "Básico";
        badge.className = "mon-header-plan mon-header-plan-basico";
      }
    }

    /* ══════════════════════════════════════════════════════════════
       INICIO: verificar sesión y suscripción
    ══════════════════════════════════════════════════════════════ */

    /* ── Tiempo mínimo que se muestra la pantalla de carga (ms) ──
       Cámbialo a tu gusto: 800 = 0.8 s, 1500 = 1.5 s, etc.       */
    const MIN_LOAD_MS = 900;

    (async function iniciar() {
      const _t0 = Date.now();
      async function _esperarMinimo() {
        const restante = MIN_LOAD_MS - (Date.now() - _t0);
        if (restante > 0) await new Promise(r => setTimeout(r, restante));
      }

      try {
        /* 1. Crear cliente Supabase */
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /* 2. Verificar sesión activa */
        const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
        if (sessionError || !sessionData?.session) {
          await _esperarMinimo();
          mostrarAccesoDenegado("Debes iniciar sesión para acceder al Monitoreo Jurídico. Vuelve al inicio y accede con tu cuenta.");
          return;
        }
        currentUser = sessionData.session.user;

        /* 3. Verificar suscripción vigente */
        const ahora = new Date();
        const { data: subs, error: subError } = await supabaseClient
          .from("suscripciones_monitoreo")
          .select("id, plan, created_at, vence_at")
          .eq("user_id", currentUser.id)
          .order("vence_at", { ascending: false })
          .limit(10);

        if (subError || !subs || subs.length === 0) {
          await _esperarMinimo();
          mostrarAccesoDenegado("No tienes una suscripción activa al Monitoreo Jurídico. Vuelve al inicio y elige un plan.");
          return;
        }

        const vigentes = subs.filter(s => new Date(s.vence_at) > ahora);
        if (vigentes.length === 0) {
          await _esperarMinimo();
          mostrarAccesoDenegado("Tu suscripción al Monitoreo Jurídico ha vencido. Vuelve al inicio para renovarla.");
          return;
        }

        /* 4. Guardar suscripción en global */
        const best = vigentes.find(s => s.plan === "premium") || vigentes[0];
        suscripcionMonitoreo = {
          id:         best.id,
          plan:       best.plan,
          created_at: best.created_at,
          vence_at:   best.vence_at,
        };

        /* 5. Mostrar badge de plan en el header */
        mostrarBadgePlan(best.plan);

        /* 6. Mostrar página y lanzar dashboard */
        await _esperarMinimo();
        ocultarCarga();
        if (typeof window.iniciarMonitoreo === "function") {
          window.iniciarMonitoreo();
        }

      } catch (err) {
        console.error("[Monitoreo] Error de inicialización:", err);
        await _esperarMinimo();
        mostrarAccesoDenegado("Ocurrió un error al verificar tu acceso. Intenta recargar la página o vuelve al inicio.");
        ocultarCarga();
      }

      /* Actualizar sesión si cambia (logout externo → redirigir) */
      supabaseClient.auth.onAuthStateChange((event) => {
        if (event === "SIGNED_OUT") {
          window.location.href = "index.html";
        }
      });
    })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════════
       MONITOREO.JS — Dashboard completo (embebido)
  ═══════════════════════════════════════════════════════════════ -->
  <script>
/* ═══════════════════════════════════════════════════════════════
   MONITOREO JURÍDICO — Dashboard de procesos Rama Judicial
   ───────────────────────────────────────────────────────────────
   Requiere: supabaseClient, currentUser, toast() — definidos arriba
   Llama directamente a la API pública de Rama Judicial (CORS: *)
   v2 — integra Publicaciones Procesales (Rama Judicial)
═══════════════════════════════════════════════════════════════ */
(function () {
  "use strict";

  /* ── Constantes ──────────────────────────────────────────────*/
  const POLL_INTERVAL_MS  = 6 * 60 * 60 * 1000;  // consulta RJ cada 6h
  const REFRESH_DB_MS     = 10 * 60 * 1000;       // refresca Supabase cada 10 min
  const PAGE_SIZE         = 10;
  const INACTIVO_DIAS     = 90;
  const RJ_API    = "https://consultaprocesos.ramajudicial.gov.co:448/api/v2";
  const RJ_PORTAL = "https://consultaprocesos.ramajudicial.gov.co/Procesos/NumeroRadicacion";
  const PP_PORTAL = "https://publicacionesprocesales.ramajudicial.gov.co/web/publicaciones-procesales";
  const RJ_HEADERS = {
    "Accept": "application/json, text/plain, */*",
    "Accept-Language": "es-CO,es;q=0.9",
    "Origin": "https://consultaprocesos.ramajudicial.gov.co",
    "Referer": "https://consultaprocesos.ramajudicial.gov.co/",
  };

  /* ── Estado ──────────────────────────────────────────────────*/
  let todosLosSeguimientos = [];
  let filtroActivo  = "todos";
  let busqueda      = "";
  let paginaActual  = 1;
  let pollingTimer  = null;
  let monitoreoActivo = false;
  let actuacionesCache     = {};
  let publicacionesCache   = {};
  let actsPagina           = {};
  let pubsPagina           = {};
  const PAGE_ITEMS         = 10;
  let erroresActualizacion = {}; // id → { ts, msg }

  /* ── Notificaciones de consulta ──────────────────────────────*/
  let consultaLogs    = [];   // { ts, total, fallos, error }
  let consultaLogsPag = 1;
  const LOGS_PER_PAG  = 10;

  /* ── Accesores seguros a globales ────────────────────────────*/
  function getUser()       { try { return typeof currentUser         !== "undefined" ? currentUser         : null; } catch (_) { return null; } }
  function getClient()     { try { return typeof supabaseClient      !== "undefined" ? supabaseClient      : null; } catch (_) { return null; } }
  function getSuscripcion(){ try { return typeof suscripcionMonitoreo !== "undefined" ? suscripcionMonitoreo : null; } catch (_) { return null; } }
  function showToast(msg, type) { try { if (typeof toast === "function") toast(msg, type); } catch (_) {} }

  const LIMITE_BASICO = 20;

  /* ── Clasificación ───────────────────────────────────────────*/
  function clasificar(s) {
    if (s.tiene_cambios) return "novedad";
    if (!s.ultima_actuacion) return "inactivo";
    const dias = (Date.now() - new Date(s.ultima_actuacion)) / 86400000;
    return dias <= INACTIVO_DIAS ? "activo" : "inactivo";
  }

  /* ══════════════════════════════════════════════════════════════
     INICIALIZACIÓN
  ══════════════════════════════════════════════════════════════ */
  async function iniciarMonitoreo() {
    let user = getUser();
    if (!user) {
      const client = getClient();
      if (client) {
        try { const { data } = await client.auth.getSession(); user = data?.session?.user || null; } catch (_) {}
      }
    }
    if (!user) { renderNoAuth(); return; }

    if (!monitoreoActivo) {
      monitoreoActivo = true;
      renderShell();
      await cargarLogs();
      actualizarContadorLogs();
      await cargarTodos();
      iniciarPolling();
    }
  }

  /* ══════════════════════════════════════════════════════════════
     SHELL
  ══════════════════════════════════════════════════════════════ */
  function renderNoAuth() {
    const c = document.getElementById("monitoreo-content");
    if (!c) return;
    monitoreoActivo = false;
    c.innerHTML = `
      <div class="mon-empty">
        <div class="mon-empty-icon">${IC.scales}</div>
        <h3>Sesión no encontrada</h3>
        <p>Tu sesión ha expirado. Vuelve al inicio para iniciar sesión de nuevo.</p>
        <div class="mon-empty-actions">
          <a href="index.html" class="btn btn-accent">Ir al inicio</a>
        </div>
      </div>`;
  }

  function renderShell() {
    const c = document.getElementById("monitoreo-content");
    if (!c) return;
    c.innerHTML = `
      <div class="mon-dashboard">
        <div class="mon-kpi-row" id="mon-kpi-row">${kpiSkeleton()}</div>
        <div class="mon-panel">
          <aside class="mon-sidebar">
            <nav class="mon-nav" id="mon-nav">
              ${navItem("todos",          IC.list,         "Todos")}
              ${navItem("novedad",        IC.bell,         "Con novedades RJ")}
              ${navItem("novedad_pp",     IC.newspaper,    "Con novedades PP")}
              ${navItem("activo",         IC.check,        "Activos")}
              ${navItem("inactivo",       IC.clock,        "Sin actividad")}
              ${navItem("notif_consulta", IC.alertCircle,  "Notificaciones de consulta")}
            </nav>
            <div class="mon-sidebar-divider"></div>
            <button class="mon-sidebar-add" id="btn-toggle-form">
              ${IC.plus} Agregar proceso
            </button>
            <button class="mon-sidebar-logout" id="mon-btn-logout">
              ${IC.logOut} Cerrar sesión
            </button>
          </aside>
          <div class="mon-main">
            <div class="mon-form-collapse" id="mon-form-wrap" style="display:none">
              <form id="form-add-radicado" class="mon-form-inner">
                <div class="mon-form-fields">
                  <div class="mon-add-field">
                    <label for="input-radicado">Número de radicado <span class="mon-req">*</span></label>
                    <input type="text" id="input-radicado"
                      placeholder="23 dígitos, sin espacios"
                      maxlength="27" autocomplete="off" inputmode="numeric" />
                  </div>
                  <div class="mon-add-field">
                    <label for="input-alias">Alias <span class="mon-opt">(opcional)</span></label>
                    <input type="text" id="input-alias"
                      placeholder="Ej: Demanda arrendamiento" maxlength="80" />
                  </div>
                </div>
                <div class="mon-form-actions">
                  <button type="submit" class="btn btn-accent" id="btn-add-radicado">${IC.plus} Agregar</button>
                  <button type="button" class="btn btn-outline" id="btn-cancel-form">Cancelar</button>
                </div>
              </form>
            </div>
            <div class="mon-toolbar">
              <div class="mon-search-wrap">
                ${IC.search}
                <input type="search" id="mon-search" class="mon-search"
                  placeholder="Buscar por radicado o alias…" autocomplete="off" />
              </div>
              <button class="mon-btn-refresh-all" id="btn-refresh-all">
                ${IC.refresh} Actualizar todos
              </button>
            </div>
            <div id="mon-list"><div class="mon-skeleton-list">${skeletonCards(3)}</div></div>
            <div class="mon-pagination" id="mon-pagination"></div>
          </div>
        </div>
      </div>`;
    bindShellEvents();
  }

  function bindShellEvents() {
    document.getElementById("btn-toggle-form").addEventListener("click", toggleForm);
    document.getElementById("btn-cancel-form").addEventListener("click", toggleForm);
    document.getElementById("form-add-radicado").addEventListener("submit", onAgregarRadicado);
    document.getElementById("btn-refresh-all").addEventListener("click", () => actualizarTodos(true));
    document.getElementById("mon-btn-logout")?.addEventListener("click", async () => {
      const client = getClient();
      if (client) await client.auth.signOut();
      window.location.href = "index.html";
    });
    const searchEl = document.getElementById("mon-search");
    let searchTimer;
    searchEl.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        busqueda = searchEl.value.trim().toLowerCase();
        paginaActual = 1;
        renderLista();
      }, 250);
    });
    document.getElementById("mon-nav").addEventListener("click", e => {
      const item = e.target.closest(".mon-nav-item");
      if (!item) return;
      filtroActivo = item.dataset.filter;
      paginaActual = 1;
      document.querySelectorAll(".mon-nav-item").forEach(el => el.classList.toggle("active", el === item));
      renderLista();
    });
  }

  function navItem(filter, icon, label) {
    return `<button class="mon-nav-item${filter === "todos" ? " active" : ""}" data-filter="${filter}">
      <span class="mon-nav-icon">${icon}</span>
      <span class="mon-nav-label">${label}</span>
      <span class="mon-nav-count" id="nav-count-${filter}">—</span>
    </button>`;
  }

  function toggleForm() {
    const wrap = document.getElementById("mon-form-wrap");
    const open = wrap.style.display !== "none";
    wrap.style.display = open ? "none" : "block";
    document.getElementById("btn-toggle-form").classList.toggle("active", !open);
    if (!open) document.getElementById("input-radicado")?.focus();
  }

  /* ══════════════════════════════════════════════════════════════
     CARGA DE DATOS
  ══════════════════════════════════════════════════════════════ */
  async function cargarTodos() {
    const client = getClient();
    const user   = getUser();
    if (!client || !user) return;

    const SEL_BASE = "id, radicado, alias, despacho, sujetos, id_proceso, ultima_actuacion, tiene_cambios, ultimo_chequeo, created_at, tiene_publicacion_nueva, pub_count";
    let rq = await client
      .from("seguimientos")
      .select(SEL_BASE + ", ultima_publicacion")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    // Si la columna ultima_publicacion aún no existe en la BD, reintentamos sin ella
    if (rq.error && (rq.error.code === "42703" || (rq.error.message || "").includes("ultima_publicacion"))) {
      rq = await client
        .from("seguimientos")
        .select(SEL_BASE)
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });
    }

    const { data, error } = rq;
    if (error) { console.error(error); return; }

    todosLosSeguimientos = data || [];
    actuacionesCache  = {};
    publicacionesCache = {};
    actsPagina        = {};
    pubsPagina        = {};
    renderKPIs();
    renderNavCounts();
    renderLista();
  }

  /* ══════════════════════════════════════════════════════════════
     KPI CARDS
  ══════════════════════════════════════════════════════════════ */
  function renderKPIs() {
    const total      = todosLosSeguimientos.length;
    const novedad    = todosLosSeguimientos.filter(s => s.tiene_cambios).length;
    const conPub     = todosLosSeguimientos.filter(s => s.tiene_publicacion_nueva).length;
    const inactivos  = todosLosSeguimientos.filter(s => clasificar(s) === "inactivo").length;

    const el = document.getElementById("mon-kpi-row");
    if (!el) return;
    el.innerHTML = `
      ${kpiCard("Total procesos",        total,    IC.folder,    "",           () => setFiltro("todos"))}
      ${kpiCard("Con novedades (RJ)",    novedad,  IC.bell,      "kpi-accent", () => setFiltro("novedad"))}
      ${kpiCard("Con publicaciones",      conPub,   IC.newspaper, "kpi-pub",   () => {})}
      ${kpiCard("Sin actividad +90 días",inactivos,IC.clockOff,  "kpi-warn",  () => setFiltro("inactivo"))}`;

    el.querySelectorAll(".mon-kpi").forEach((card, i) => {
      card.addEventListener("click", [
        () => setFiltro("todos"),
        () => setFiltro("novedad"),
        () => {},
        () => setFiltro("inactivo"),
      ][i]);
    });
  }

  function kpiCard(label, value, icon, cls, _onClick) {
    return `<div class="mon-kpi ${cls}" role="button" tabindex="0">
      <div class="mon-kpi-icon">${icon}</div>
      <div class="mon-kpi-body">
        <div class="mon-kpi-value">${value}</div>
        <div class="mon-kpi-label">${label}</div>
      </div>
    </div>`;
  }

  function kpiSkeleton() {
    return `<div class="mon-kpi mon-skel"></div>`.repeat(4);
  }

  function setFiltro(f) {
    filtroActivo = f;
    paginaActual = 1;
    document.querySelectorAll(".mon-nav-item").forEach(el =>
      el.classList.toggle("active", el.dataset.filter === f));
    renderLista();
  }

  /* ══════════════════════════════════════════════════════════════
     CONTADORES SIDEBAR
  ══════════════════════════════════════════════════════════════ */
  function renderNavCounts() {
    const counts = { todos: 0, novedad: 0, novedad_pp: 0, activo: 0, inactivo: 0 };
    todosLosSeguimientos.forEach(s => {
      counts.todos++;
      counts[clasificar(s)]++;
      if (s.tiene_publicacion_nueva) counts.novedad_pp++;
    });
    Object.keys(counts).forEach(k => {
      const el = document.getElementById(`nav-count-${k}`);
      if (el) el.textContent = counts[k];
    });
    actualizarContadorLogs();
  }

  /* ══════════════════════════════════════════════════════════════
     FILTRAR + PAGINAR + RENDERIZAR LISTA
  ══════════════════════════════════════════════════════════════ */
  function datosFiltrados() {
    return todosLosSeguimientos.filter(s => {
      if (filtroActivo === "novedad_pp") {
        if (!s.tiene_publicacion_nueva) return false;
      } else if (filtroActivo !== "todos" && clasificar(s) !== filtroActivo) return false;
      if (busqueda) {
        const hay = (s.radicado + (s.alias || "") + (s.despacho || "")).toLowerCase();
        if (!hay.includes(busqueda)) return false;
      }
      return true;
    });
  }

  function renderLista() {
    const el = document.getElementById("mon-list");
    if (!el) return;

    if (filtroActivo === "notif_consulta") {
      renderLogs();
      return;
    }

    const filtrados = datosFiltrados();
    const totalPags = Math.max(1, Math.ceil(filtrados.length / PAGE_SIZE));
    if (paginaActual > totalPags) paginaActual = totalPags;
    const desde = (paginaActual - 1) * PAGE_SIZE;
    const pagina = filtrados.slice(desde, desde + PAGE_SIZE);

    if (filtrados.length === 0) {
      el.innerHTML = `<div class="mon-empty mon-empty-inline">
        ${todosLosSeguimientos.length === 0
          ? `${IC.scales}<p>Aún no tienes procesos. Usa <strong>Agregar proceso</strong> para comenzar.</p>`
          : `${IC.search}<p>Ningún proceso coincide con tu búsqueda o filtro.</p>`}
      </div>`;
      renderPaginacion(0, 0);
      return;
    }

    el.innerHTML = pagina.map(s => renderTarjeta(s)).join("");
    bindTarjetaEvents(pagina);
    renderPaginacion(filtrados.length, totalPags);
    renderNavCounts();
  }

  /* ══════════════════════════════════════════════════════════════
     TARJETA
  ══════════════════════════════════════════════════════════════ */
  function renderTarjeta(s) {
    const clase = clasificar(s);
    const fecha = s.ultimo_chequeo
      ? new Date(s.ultimo_chequeo).toLocaleString("es-CO", { dateStyle: "short", timeStyle: "short" })
      : "Nunca";
    const ultimaAct = s.ultima_actuacion
      ? new Date(s.ultima_actuacion).toLocaleDateString("es-CO", { day: "2-digit", month: "short", year: "numeric" })
      : null;
    const diasDesde = s.ultima_actuacion
      ? Math.floor((Date.now() - new Date(s.ultima_actuacion)) / 86400000)
      : null;

    const diasDesdePP = s.ultima_publicacion
      ? Math.floor((Date.now() - new Date(s.ultima_publicacion)) / 86400000)
      : null;

    const estadoLabel = { novedad: "Con novedad", activo: "Activo", inactivo: "Sin actividad" }[clase];
    const estadoCls   = { novedad: "mon-estado-novedad", activo: "mon-estado-activo", inactivo: "mon-estado-inactivo" }[clase];
    const pubCount    = s.pub_count || 0;

    return `
    <div class="mon-card mon-card-${clase}" id="moncard-${s.id}">
      <div class="mon-card-body">
        <div class="mon-card-left">
          <div class="mon-card-top-row">
            <span class="mon-estado ${estadoCls}">${estadoLabel}</span>
            ${s.tiene_cambios          ? `<span class="mon-badge-new">Nueva actuación</span>` : ""}
            ${s.tiene_publicacion_nueva ? `<span class="mon-badge-pub">${IC.newspaper} Publicación nueva</span>` : ""}
          </div>
          <div class="mon-card-radicado">${escHtml(s.radicado)}</div>
          ${s.alias ? `<div class="mon-card-alias">${escHtml(s.alias)}</div>` : ""}
          <div class="mon-card-details">
            ${s.despacho ? `<span class="mon-detail">${IC.building} ${escHtml(s.despacho.trim())}</span>` : ""}
            ${s.sujetos  ? `<span class="mon-detail">${IC.users} ${escHtml(s.sujetos.replace(/\r?\n\t+/g, " · ").trim())}</span>` : ""}
          </div>
        </div>

        <div class="mon-card-right">
          <div class="mon-card-metrics">
            ${ultimaAct ? `
            <div class="mon-metric">
              <span class="mon-metric-value">${ultimaAct}</span>
              <span class="mon-metric-label">Último movimiento</span>
            </div>` : ""}
            ${diasDesde !== null ? `
            <div class="mon-metric">
              <span class="mon-metric-value ${diasDesde > INACTIVO_DIAS ? "mon-metric-warn" : ""}">${diasDesde}</span>
              <span class="mon-metric-label">días sin act. RJ <i class="mon-info-icon" data-tip="Días transcurridos desde la última actuación registrada en el portal Consulta Procesos de la Rama Judicial.">i</i></span>
            </div>` : ""}
            ${diasDesdePP !== null ? `
            <div class="mon-metric">
              <span class="mon-metric-value ${diasDesdePP > INACTIVO_DIAS ? "mon-metric-warn" : ""}">${diasDesdePP}</span>
              <span class="mon-metric-label">días sin pub. PP</span>
            </div>` : ""}
          </div>
          <div class="mon-card-actions">
            <a class="mon-action-btn" href="${RJ_PORTAL}" target="_blank" rel="noopener" title="Ver en Rama Judicial">
              ${IC.link}<span>Rama Judicial</span>
            </a>
            <button class="mon-action-btn" id="btn-refresh-${s.id}" title="Actualizar proceso">
              ${IC.refresh}
            </button>
            <button class="mon-action-btn mon-action-danger" id="btn-delete-${s.id}" title="Eliminar">
              ${IC.trash}
            </button>
          </div>
        </div>
      </div>

      <div class="mon-card-foot">
        <span class="mon-foot-meta">${IC.clockSm} Última consulta: ${fecha}</span>
        <div class="mon-foot-toggles">
          <button class="mon-toggle-acts" id="btn-ver-${s.id}" data-id="${s.id}">
            Ver actuaciones ${IC.chevron}
          </button>
          ${pubCount > 0 ? `
          <button class="mon-toggle-pubs ${s.tiene_publicacion_nueva ? "mon-toggle-pubs-new" : ""}" id="btn-pubs-${s.id}" data-id="${s.id}">
            ${IC.newspaper} Publicaciones ${s.tiene_publicacion_nueva ? `<span class="mon-pub-count">1</span>` : ""} ${IC.chevron}
          </button>` : ""}
        </div>
      </div>

      <div class="mon-actuaciones" id="actuaciones-${s.id}" style="display:none">
        <div class="mon-acts-loading" id="acts-loading-${s.id}">
          <div class="loading-spinner" style="width:24px;height:24px;margin:20px auto;display:block;"></div>
        </div>
      </div>

      ${pubCount > 0 ? `
      <div class="mon-publicaciones-panel" id="pubs-panel-${s.id}" style="display:none">
        <div class="mon-pubs-loading" id="pubs-loading-${s.id}">
          <div class="loading-spinner" style="width:24px;height:24px;margin:20px auto;display:block;"></div>
        </div>
      </div>` : ""}

      ${erroresActualizacion[s.id] ? (() => {
        const e = erroresActualizacion[s.id];
        const ts = e.ts.toLocaleString("es-CO", { dateStyle: "short", timeStyle: "short" });
        return `<div class="mon-err-strip" id="err-strip-${s.id}">
          ${IC.alertTriangle}
          <span class="mon-err-strip-msg"><strong>No se pudo actualizar:</strong> ${escHtml(e.msg)}</span>
          <span class="mon-err-strip-ts">${ts}</span>
          <button class="mon-err-strip-retry" onclick="window._monReintentarUno('${s.id}')">${IC.refresh} Reintentar</button>
          <button class="mon-err-strip-close" title="Cerrar" onclick="window._monCerrarError('${s.id}')">${IC.xClose}</button>
        </div>`;
      })() : ""}
    </div>`;
  }

  function bindTarjetaEvents(pagina) {
    pagina.forEach(s => {
      document.getElementById(`btn-refresh-${s.id}`)?.addEventListener("click", () => actualizarUno(s, true));
      document.getElementById(`btn-delete-${s.id}`)?.addEventListener("click",  () => eliminar(s.id));
      document.getElementById(`btn-ver-${s.id}`)?.addEventListener("click",     () => toggleActuaciones(s));
      document.getElementById(`btn-pubs-${s.id}`)?.addEventListener("click",    () => togglePublicaciones(s));
    });
  }

  /* ══════════════════════════════════════════════════════════════
     ACTUACIONES — carga bajo demanda
  ══════════════════════════════════════════════════════════════ */
  async function toggleActuaciones(s) {
    const panel = document.getElementById(`actuaciones-${s.id}`);
    const btn   = document.getElementById(`btn-ver-${s.id}`);
    if (!panel) return;

    const abierto = panel.style.display !== "none";
    panel.style.display = abierto ? "none" : "block";
    btn?.classList.toggle("mon-toggle-open", !abierto);

    if (!abierto) {
      if (!actuacionesCache[s.id]) {
        await cargarActuacionesDemanda(s);
      } else {
        renderActuaciones(s.id, actuacionesCache[s.id]);
      }
    }
  }

  async function cargarActuacionesDemanda(s) {
    const client = getClient();
    if (!client) return;
    const { data } = await client
      .from("seguimientos")
      .select("actuaciones")
      .eq("id", s.id)
      .single();

    const acts = Array.isArray(data?.actuaciones) ? data.actuaciones : [];
    actuacionesCache[s.id] = acts;
    renderActuaciones(s.id, acts);
  }

  function renderActuaciones(id, acts) {
    const loading = document.getElementById(`acts-loading-${id}`);
    if (loading) loading.remove();

    const panel = document.getElementById(`actuaciones-${id}`);
    if (!panel) return;

    if (acts.length === 0) {
      panel.innerHTML = `<p class="mon-acts-empty">Sin actuaciones registradas para este proceso.</p>`;
      return;
    }

    const pag       = actsPagina[id] || 1;
    const totalPags = Math.ceil(acts.length / PAGE_ITEMS);
    const slice     = acts.slice((pag - 1) * PAGE_ITEMS, pag * PAGE_ITEMS);

    panel.innerHTML = `
      <div class="mon-acts-header">
        <span>${IC.fileText} ${acts.length} actuación${acts.length !== 1 ? "es" : ""}</span>
      </div>
      <div class="mon-acts-list">
        ${slice.map((a, i) => `
          <div class="mon-act-row ${a.esNueva ? "mon-act-new" : ""}">
            <div class="mon-act-timeline">
              <div class="mon-act-dot ${a.esNueva ? "mon-act-dot-new" : ""}"></div>
              ${i < slice.length - 1 ? '<div class="mon-act-line"></div>' : ""}
            </div>
            <div class="mon-act-body">
              <div class="mon-act-fecha">${a.fechaActuacion ? new Date(a.fechaActuacion).toLocaleDateString("es-CO", { day:"2-digit", month:"short", year:"numeric" }) : ""}</div>
              <div class="mon-act-nombre">${escHtml(a.actuacion || "")}</div>
              ${a.anotacion ? `<div class="mon-act-anot">${escHtml(a.anotacion)}</div>` : ""}
            </div>
          </div>`).join("")}
      </div>
      ${totalPags > 1 ? `<div class="mon-item-pager">
        <button class="mon-pager-btn" ${pag <= 1 ? "disabled" : `onclick="window._cambiarPaginaItem('acts','${id}',${pag - 1})"`}>‹ Ant.</button>
        <span class="mon-pager-info">${pag} / ${totalPags}</span>
        <button class="mon-pager-btn" ${pag >= totalPags ? "disabled" : `onclick="window._cambiarPaginaItem('acts','${id}',${pag + 1})"`}>Sig. ›</button>
      </div>` : ""}`;
  }

  /* ══════════════════════════════════════════════════════════════
     PUBLICACIONES PROCESALES — carga bajo demanda
  ══════════════════════════════════════════════════════════════ */
  async function togglePublicaciones(s) {
    const panel = document.getElementById(`pubs-panel-${s.id}`);
    const btn   = document.getElementById(`btn-pubs-${s.id}`);
    if (!panel) return;

    const abierto = panel.style.display !== "none";
    panel.style.display = abierto ? "none" : "block";
    btn?.classList.toggle("mon-toggle-open", !abierto);

    if (!abierto) {
      if (!publicacionesCache[s.id]) {
        await cargarPublicacionesDemanda(s);
      } else {
        renderPublicaciones(s.id, publicacionesCache[s.id]);
        if (s.tiene_publicacion_nueva) await marcarPPVista(s.id);
      }
    }
  }

  async function cargarPublicacionesDemanda(s) {
    const client = getClient();
    if (!client) return;
    const { data } = await client
      .from("seguimientos")
      .select("publicaciones_procesales, tiene_publicacion_nueva")
      .eq("id", s.id)
      .single();

    const pubs = Array.isArray(data?.publicaciones_procesales) ? data.publicaciones_procesales : [];
    publicacionesCache[s.id] = pubs;
    renderPublicaciones(s.id, pubs);
    if (data?.tiene_publicacion_nueva) await marcarPPVista(s.id);
  }

  async function marcarPPVista(segId) {
    const client = getClient();
    if (!client) return;
    await client
      .from("seguimientos")
      .update({ tiene_publicacion_nueva: false })
      .eq("id", segId);
    const idx = todosLosSeguimientos.findIndex(x => x.id === segId);
    if (idx !== -1) todosLosSeguimientos[idx].tiene_publicacion_nueva = false;
    const badge = document.querySelector(`#moncard-${segId} .mon-badge-pub`);
    if (badge) badge.remove();
    const btn = document.getElementById(`btn-pubs-${segId}`);
    if (btn) {
      btn.classList.remove("mon-toggle-pubs-new");
      const cntBadge = btn.querySelector(".mon-pub-count");
      if (cntBadge) cntBadge.remove();
    }
    renderKPIs();
    renderNavCounts();
  }
  window._marcarPPVista = marcarPPVista;

  function renderPublicaciones(id, pubs) {
    const loading = document.getElementById(`pubs-loading-${id}`);
    if (loading) loading.remove();

    const panel = document.getElementById(`pubs-panel-${id}`);
    if (!panel) return;

    if (!pubs.length) {
      panel.innerHTML = `<p class="mon-acts-empty">No se han detectado publicaciones procesales para este proceso.</p>`;
      return;
    }

    const ppBase = "https://publicacionesprocesales.ramajudicial.gov.co";

    const pagPub       = pubsPagina[id] || 1;
    const totalPagsPub = Math.ceil(pubs.length / PAGE_ITEMS);
    const slicePub     = pubs.slice((pagPub - 1) * PAGE_ITEMS, pagPub * PAGE_ITEMS);

    panel.innerHTML = `
      <div class="mon-pub-header">
        ${IC.newspaper}
        <span>${pubs.length} publicación${pubs.length !== 1 ? "es" : ""} detectada${pubs.length !== 1 ? "s" : ""} en tu juzgado</span>
        <span class="mon-pub-header-hint">Las marcadas con ${IC.checkCircle} contienen tu radicado</span>
      </div>
      <div class="mon-pub-list">
        ${slicePub.map(p => {
          const pdfHref = p.pdfUrl
            ? (p.pdfUrl.startsWith("http") ? p.pdfUrl : `${ppBase}${p.pdfUrl}`)
            : null;

            ? `${ppBase}/#/consultaPublicacion?numero=${encodeURIComponent(p.articleId)}`

          const fechaStr = fecha
            ? new Date(fecha).toLocaleDateString("es-CO", { day:"2-digit", month:"short", year:"numeric" })
            : "";
          return `
          <div class="mon-pub-item ${p.radicadoEncontrado ? "mon-pub-item-match" : ""}">
            <div class="mon-pub-item-top">
              ${p.radicadoEncontrado
                ? `<span class="mon-pub-found">${IC.checkCircle} Radicado encontrado</span>`
                : `<span class="mon-pub-court">${IC.building2} En tu juzgado</span>`}
              ${fechaStr ? `<span class="mon-pub-date">${fechaStr}</span>` : ""}
            </div>
            <div class="mon-pub-title">${escHtml(p.title || "Sin título")}</div>
            ${p.nomDespacho ? `<div class="mon-pub-despacho">${escHtml(p.nomDespacho)}</div>` : ""}
            <div class="mon-pub-item-actions">
              <button class="mon-action-btn mon-action-pp" onclick="window._abrirPortalPP('${escHtml(portalHref)}', '${id}')" title="Ir a la publicación en el portal">
                ${IC.link}<span>Ir a la publicación</span>
              </button>

        <span class="mon-pager-info">${pagPub} / ${totalPagsPub}</span>
        <button class="mon-pager-btn" ${pagPub >= totalPagsPub ? "disabled" : `onclick="window._cambiarPaginaItem('pubs','${id}',${pagPub + 1})"`}>Sig. ›</button>

  /* ══════════════════════════════════════════════════════════════
     PAGINACIÓN
  ══════════════════════════════════════════════════════════════ */
  function renderPaginacion(total, totalPags) {
    const el = document.getElementById("mon-pagination");
    if (!el) return;

    if (totalPags <= 1) { el.innerHTML = ""; return; }

    const desde = (paginaActual - 1) * PAGE_SIZE + 1;
    const hasta = Math.min(paginaActual * PAGE_SIZE, total);

    let pagBtns = "";
    paginasVisibles(paginaActual, totalPags).forEach(p => {
      if (p === "…") pagBtns += `<span class="mon-pag-ellipsis">…</span>`;
      else pagBtns += `<button class="mon-pag-btn ${p === paginaActual ? "active" : ""}" data-pag="${p}">${p}</button>`;
    });

    el.innerHTML = `
      <div class="mon-pag-info">${desde}–${hasta} de ${total}</div>
      <div class="mon-pag-controls">
        <button class="mon-pag-btn mon-pag-nav" id="pag-prev" ${paginaActual === 1 ? "disabled" : ""}>${IC.chevLeft}</button>
        ${pagBtns}
        <button class="mon-pag-btn mon-pag-nav" id="pag-next" ${paginaActual === totalPags ? "disabled" : ""}>${IC.chevRight}</button>
      </div>`;

    el.querySelectorAll(".mon-pag-btn[data-pag]").forEach(btn =>
      btn.addEventListener("click", () => { paginaActual = +btn.dataset.pag; renderLista(); scroll2List(); }));
    el.querySelector("#pag-prev")?.addEventListener("click", () => { paginaActual--; renderLista(); scroll2List(); });
    el.querySelector("#pag-next")?.addEventListener("click", () => { paginaActual++; renderLista(); scroll2List(); });
  }

  function paginasVisibles(actual, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [1];
    if (actual > 3) pages.push("…");
    for (let p = Math.max(2, actual - 1); p <= Math.min(total - 1, actual + 1); p++) pages.push(p);
    if (actual < total - 2) pages.push("…");
    pages.push(total);
    return pages;
  }

  function scroll2List() {
    document.getElementById("mon-list")?.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  /* ══════════════════════════════════════════════════════════════
     AGREGAR
  ══════════════════════════════════════════════════════════════ */
  async function onAgregarRadicado(e) {
    e.preventDefault();
    const raw   = (document.getElementById("input-radicado")?.value || "").replace(/\s/g, "");
    const alias = (document.getElementById("input-alias")?.value || "").trim();

    if (!/^\d{23}$/.test(raw)) { showToast("El radicado debe tener exactamente 23 dígitos.", "error"); return; }
    if (todosLosSeguimientos.some(s => s.radicado === raw)) { showToast("Ya tienes ese radicado en seguimiento.", "error"); return; }

    const suscripcion = getSuscripcion();
    if (suscripcion?.plan === "basico" && todosLosSeguimientos.length >= LIMITE_BASICO) {
      showToast(`El Plan Básico permite hasta ${LIMITE_BASICO} procesos. Actualiza a Premium para agregar más.`, "error");
      return;
    }

    const btn = document.getElementById("btn-add-radicado");
    btn.disabled = true; btn.innerHTML = `${IC.spinner} Consultando…`;

    try {
      const resultado = await consultarRamaJudicial(raw).catch(err => {
        showToast(friendlyRJError(err), "error");
        return null;
      });
      if (!resultado) return;

      const { proceso, actuaciones } = resultado;
      const client = getClient();
      const user   = getUser();

      const { data, error } = await client
        .from("seguimientos")
        .insert({
          user_id:         user.id,
          radicado:        raw,
          alias:           alias || null,
          nombre_proceso:  proceso.tipoProceso   || null,
          despacho:        proceso.despacho      || null,
          sujetos:         proceso.sujetosProcesales || null,
          id_proceso:      String(proceso.idProceso),
          actuaciones,
          ultima_actuacion: actuaciones[0]?.fechaActuacion || null,
          tiene_cambios:   false,
          ultimo_chequeo:  new Date().toISOString(),
        })
        .select("id, radicado, alias, despacho, sujetos, id_proceso, ultima_actuacion, tiene_cambios, ultimo_chequeo, created_at, tiene_publicacion_nueva, pub_count")
        .single();

      if (error) throw error;

      actuacionesCache[data.id]   = actuaciones;
      publicacionesCache[data.id] = [];
      todosLosSeguimientos.unshift(data);
      document.getElementById("input-radicado").value = "";
      document.getElementById("input-alias").value    = "";
      toggleForm();
      renderKPIs();
      renderNavCounts();
      renderLista();
      showToast("Proceso agregado al monitoreo.", "ok");
    } catch (err) {
      console.error(err);
      showToast("Error al agregar el proceso. Intenta de nuevo.", "error");
    } finally {
      btn.disabled = false; btn.innerHTML = `${IC.plus} Agregar`;
    }
  }

  /* ══════════════════════════════════════════════════════════════
     CONSULTAR Rama Judicial — lanza error en vez de retornar null
  ══════════════════════════════════════════════════════════════ */
  async function consultarRamaJudicial(radicado, { silencioso = false } = {}) {
    const r = await fetch(
      `${RJ_API}/Procesos/Consulta/NumeroRadicacion?numero=${radicado}&SoloActivos=false&pagina=1`,
      { headers: RJ_HEADERS }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (!d.procesos?.length) {
      const err = new Error("Proceso no encontrado");
      err.noEncontrado = true;
      throw err;
    }
    const proceso = d.procesos[0];
    const rAct = await fetch(`${RJ_API}/Proceso/Actuaciones/${proceso.idProceso}?pagina=1`, { headers: RJ_HEADERS });
    const dAct = rAct.ok ? await rAct.json() : {};
    const actuaciones = Array.isArray(dAct.actuaciones) ? dAct.actuaciones
                      : Array.isArray(dAct) ? dAct : [];
    return { proceso, actuaciones };
  }

  /* ══════════════════════════════════════════════════════════════
     CONSULTAR Publicaciones Procesales (RJ API)
  ══════════════════════════════════════════════════════════════ */
  async function consultarPublicacionesProcesales(s) {
    if (!s.id_proceso) return { pubs: [], error: null };
    try {
      const r = await fetch(
        `${RJ_API}/Proceso/Publicaciones/${s.id_proceso}?pagina=1`,
        { headers: RJ_HEADERS }
      );
      // 404 = este proceso no tiene publicaciones indexadas por este canal; no es una caída
      if (r.status === 404) return { pubs: [], error: null };
      // Otros errores HTTP sí indican que el servicio está caído (503, 500, 502…)
      if (!r.ok) return { pubs: [], error: `Publicaciones Procesales caído (HTTP ${r.status})` };
      let d;
      try { d = await r.json(); } catch (_) {
        return { pubs: [], error: "Publicaciones Procesales: respuesta inesperada del servidor" };
      }
      const pubs = Array.isArray(d.publicaciones) ? d.publicaciones
                 : Array.isArray(d) ? d : [];
      return { pubs, error: null };
    } catch (err) {
      // Error de red: servicio inaccesible, timeout, CORS bloqueado, etc.
      const esRed = !err?.message || err.message.toLowerCase().includes("fetch") || err.message.toLowerCase().includes("network");
      return { pubs: [], error: esRed ? "Sin conexión con Publicaciones Procesales" : err.message };
    }
  }

  /* ── Mensaje amigable según el tipo de error RJ ─────────────*/
  function friendlyRJError(err) {
    const msg = (err?.message || String(err)).toLowerCase();
    if (err?.noEncontrado)
      return "No se encontró el proceso en Rama Judicial.";
    if (msg.includes("timeout") || msg.includes("signal") || msg.includes("timed out") || msg.includes("aborted"))
      return "La Rama Judicial no respondió (timeout). Puede estar caída.";
    if (msg.includes("failed to fetch") || msg.includes("networkerror") || msg.includes("net::"))
      return "Sin conexión con la Rama Judicial. Verifica tu internet.";
    if (msg.includes("502") || msg.includes("503") || msg.includes("504"))
      return "La Rama Judicial está en mantenimiento. Intenta más tarde.";
    if (msg.includes("http 4") || msg.includes("http 5"))
      return `Error del servidor de Rama Judicial (${err.message}).`;
    return "No se pudo consultar la Rama Judicial. Intenta de nuevo.";
  }

  /* ── Inyectar / quitar franja de error en la tarjeta ────────*/
  function actualizarErrorStrip(id, errorMsg) {
    const card = document.getElementById(`moncard-${id}`);
    if (!card) return;
    const existing = card.querySelector(".mon-err-strip");
    if (!errorMsg) { if (existing) existing.remove(); return; }
    const ts = new Date().toLocaleString("es-CO", { dateStyle: "short", timeStyle: "short" });
    const html = `<div class="mon-err-strip" id="err-strip-${id}">
      ${IC.alertTriangle}
      <span class="mon-err-strip-msg"><strong>No se pudo actualizar:</strong> ${escHtml(errorMsg)}</span>
      <span class="mon-err-strip-ts">${ts}</span>
      <button class="mon-err-strip-retry" onclick="window._monReintentarUno('${id}')">${IC.refresh} Reintentar</button>
      <button class="mon-err-strip-close" title="Cerrar" onclick="window._monCerrarError('${id}')">${IC.xClose}</button>
    </div>`;
    if (existing) existing.outerHTML = html;
    else card.insertAdjacentHTML("beforeend", html);
  }

  window._monCerrarError   = function(id) { delete erroresActualizacion[id]; actualizarErrorStrip(id, null); };
  window._monReintentarUno = async function(id) {
    const s = todosLosSeguimientos.find(x => x.id === id);
    if (s) await actualizarUno(s, true);
  };

  /* ══════════════════════════════════════════════════════════════
     ACTUALIZAR UNO
  ══════════════════════════════════════════════════════════════ */
  async function actualizarUno(s, manual = false) {
    const btnR = document.getElementById(`btn-refresh-${s.id}`);
    const orig = btnR?.innerHTML;
    if (btnR) { btnR.disabled = true; btnR.innerHTML = IC.spinner; }

    let ppError = null;

    try {
      let prevActs = actuacionesCache[s.id];
      if (!prevActs) {
        const { data } = await getClient().from("seguimientos").select("actuaciones").eq("id", s.id).single();
        prevActs = data?.actuaciones || [];
        actuacionesCache[s.id] = prevActs;
      }

      const resultado = await consultarRamaJudicial(s.radicado);
      if (!resultado) return { ok: false, error: "No se obtuvo respuesta de la Rama Judicial" };

      const { proceso, actuaciones } = resultado;
      const cambio = actuaciones[0]?.fechaActuacion !== prevActs[0]?.fechaActuacion;
      const acts   = actuaciones.map((a, i) => ({ ...a, esNueva: i === 0 && cambio }));
      const ahora  = new Date().toISOString();

      // ── Consultar Publicaciones Procesales ──
      const { pubs, error: errPP } = await consultarPublicacionesProcesales(s);
      ppError = errPP;

      let prevPubs = publicacionesCache[s.id];
      if (!prevPubs) {
        const { data: dpub } = await getClient().from("seguimientos").select("publicaciones_procesales").eq("id", s.id).single();
        prevPubs = Array.isArray(dpub?.publicaciones_procesales) ? dpub.publicaciones_procesales : [];
        publicacionesCache[s.id] = prevPubs;
      }
      const pubNueva  = pubs.length > (prevPubs.length || 0);
      const ultimaPub = pubs[0]?.fecha || pubs[0]?.fechaRadicado || null;

      // ── Actualizar Supabase — campos RJ ──
      await getClient().from("seguimientos").update({
        despacho:         proceso.despacho            || s.despacho,
        sujetos:          proceso.sujetosProcesales   || s.sujetos,
        actuaciones:      acts,
        ultima_actuacion: actuaciones[0]?.fechaActuacion || null,
        tiene_cambios:    cambio,
        ultimo_chequeo:   ahora,
      }).eq("id", s.id);

      // ── Actualizar Supabase — campos PP (columnas opcionales) ──
      try {
        const ppPayload = {
          publicaciones_procesales: pubs,
          pub_count:                pubs.length,
          tiene_publicacion_nueva:  pubNueva || s.tiene_publicacion_nueva || false,
        };
        if (ultimaPub) ppPayload.ultima_publicacion = ultimaPub;
        await getClient().from("seguimientos").update(ppPayload).eq("id", s.id);
        publicacionesCache[s.id] = pubs;
      } catch (_ppUpd) {}

      actuacionesCache[s.id] = acts;

      const idx = todosLosSeguimientos.findIndex(x => x.id === s.id);
      if (idx !== -1) Object.assign(todosLosSeguimientos[idx], {
        despacho:               proceso.despacho          || s.despacho,
        sujetos:                proceso.sujetosProcesales || s.sujetos,
        ultima_actuacion:       actuaciones[0]?.fechaActuacion || null,
        tiene_cambios:          cambio,
        ultimo_chequeo:         ahora,
        pub_count:              pubs.length,
        tiene_publicacion_nueva: pubNueva || s.tiene_publicacion_nueva || false,
      });

      /* Éxito — limpiar error previo si había */
      delete erroresActualizacion[s.id];
      actualizarErrorStrip(s.id, null);

      renderKPIs();
      renderNavCounts();
      renderLista();

      if (manual) {
        await guardarLog({
          ts:     new Date().toISOString(),
          total:  1,
          fallos: ppError ? 1 : 0,
          error:  ppError ? `PP: ${ppError}` : null,
        });
        showToast(cambio ? `Nuevo movimiento en ${s.alias || s.radicado.slice(-6)}` : "Sin cambios en Rama Judicial.", cambio ? "ok" : "");
      } else if (cambio) {
        showToast(`Nuevo movimiento: ${s.alias || s.radicado.slice(-6)}`, "ok");
      }
      return { ok: true, ppError };

    } catch (err) {
      console.error("[Monitoreo] actualizarUno:", err);
      const msg = friendlyRJError(err);
      erroresActualizacion[s.id] = { ts: new Date(), msg };
      actualizarErrorStrip(s.id, msg);
      if (manual) {
        showToast(msg, "error");
        await guardarLog({ ts: new Date().toISOString(), total: 1, fallos: 1, error: `RJ: ${msg}` });
      }
      return { ok: false, error: msg };
    } finally {
      if (btnR) { btnR.disabled = false; btnR.innerHTML = orig || IC.refresh; }
    }
  }

  /* ══════════════════════════════════════════════════════════════
     ACTUALIZAR TODOS
  ══════════════════════════════════════════════════════════════ */
  async function actualizarTodos(manual = false) {
    if (!todosLosSeguimientos.length) {
      if (manual) showToast("No tienes procesos en seguimiento.", "");
      return;
    }
    const btn = document.getElementById("btn-refresh-all");
    if (btn) { btn.disabled = true; btn.innerHTML = `${IC.spinner} Consultando…`; }

    const lista = [...todosLosSeguimientos];
    let rjErrCount = 0, ppErrCount = 0;
    let lastRjErr = null, lastPpErr = null;

    for (let i = 0; i < lista.length; i += 5) {
      const resultados = await Promise.allSettled(lista.slice(i, i + 5).map(s => actualizarUno(s, false)));
      resultados.forEach(r => {
        const val = r.status === "fulfilled" ? r.value : { ok: false, error: r.reason?.message };
        if (!val?.ok)     { rjErrCount++; if (val?.error)   lastRjErr = val.error; }
        if (val?.ppError) { ppErrCount++; lastPpErr = val.ppError; }
      });
    }

    const totalFallos = rjErrCount + ppErrCount;
    let errMsg = null;
    if (rjErrCount > 0 && ppErrCount > 0) errMsg = `RJ: ${lastRjErr} | PP: ${lastPpErr}`;
    else if (rjErrCount > 0) errMsg = `RJ: ${lastRjErr}`;
    else if (ppErrCount > 0) errMsg = `PP: ${lastPpErr}`;

    await guardarLog({ ts: new Date().toISOString(), total: lista.length, fallos: totalFallos, error: errMsg });

    try { await cargarTodos(); } catch(_) {}

    if (btn) { btn.disabled = false; btn.innerHTML = `${IC.refresh} Actualizar todos`; }
    if (manual) showToast(
      totalFallos > 0
        ? `${totalFallos} proceso(s) no se pudieron consultar. Revisa las Notificaciones de consulta.`
        : "Rama Judicial y Publicaciones Procesales actualizados.",
      totalFallos > 0 ? "error" : "ok"
    );
  }

  /* ══════════════════════════════════════════════════════════════
     ELIMINAR
  ══════════════════════════════════════════════════════════════ */
  async function eliminar(id) {
    if (!confirm("¿Eliminar este proceso del monitoreo?")) return;
    const { error } = await getClient().from("seguimientos").delete().eq("id", id);
    if (error) { showToast("Error al eliminar.", "error"); return; }
    todosLosSeguimientos = todosLosSeguimientos.filter(s => s.id !== id);
    delete actuacionesCache[id];
    delete publicacionesCache[id];
    delete actsPagina[id];
    delete pubsPagina[id];
    renderKPIs();
    renderNavCounts();
    renderLista();
    showToast("Proceso eliminado.", "");
  }

  /* ══════════════════════════════════════════════════════════════
     POLLING
  ══════════════════════════════════════════════════════════════ */
  let refreshDbTimer = null;

  function iniciarPolling() {
    if (pollingTimer)   clearInterval(pollingTimer);
    if (refreshDbTimer) clearInterval(refreshDbTimer);

    // Polling pesado: consulta la Rama Judicial cada 6 horas
    pollingTimer = setInterval(() => {
      if (getUser() && todosLosSeguimientos.length) actualizarTodos(false);
    }, POLL_INTERVAL_MS);

    // Polling ligero: refresca desde Supabase cada 10 min (recoge cambios del cron)
    refreshDbTimer = setInterval(async () => {
      if (getUser() && monitoreoActivo) {
        await cargarTodos();
        await cargarLogs();
        actualizarContadorLogs();
        if (filtroActivo === "notif_consulta") renderLogs();
      }
    }, REFRESH_DB_MS);

    // Refrescar al volver a la pestaña
    document.addEventListener("visibilitychange", _onVisibilityChange);
  }

  async function _onVisibilityChange() {
    if (!document.hidden && getUser() && monitoreoActivo) {
      await cargarTodos();
      await cargarLogs();
      actualizarContadorLogs();
      if (filtroActivo === "notif_consulta") renderLogs();
    }
  }
